        body {

        .container {
            max-width: 600px;
            margin: 50px auto;

            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {

            color: #333;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        label {
            margin: 10px 0 5px;
            font-weight: bold;
        }
        input[type="text"],
        input[type="tel"] {
            padding: 10px;

            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        .footer {
            text-align: center;
            font-size: 0.8rem;
            color: #333; /* dark color for visibility on white background */
            margin-top: 20px;
        }
        .footer a {
            color: #0066cc; /* visible blue links */
            text-decoration: underline;
        }
        body::before {
          content: "";
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background-color: #1a1a1a;
          z-index: -1;
        }
        .navbar {
          background-color: #003366;
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 0.5rem 1rem;
          flex-wrap: wrap;
        }
        .logo-container {
          display: flex;
          align-items: center;
        }
        .logo-img {
          height: 40px;
          margin-right: 0.5rem;
        }
        .logo-text {
          color: #fff;
          font-weight: bold;
          font-size: 1rem;
        }
        .logo-text span {
          display: block;
          font-size: 0.65rem;
          color: #ccc;
        }
        nav ul {
          list-style: none;
          display: flex;
          flex-wrap: wrap;
          gap: 1rem;
          padding: 0;
          margin: 0;
        }
        nav a {
          color: #fff;
          text-decoration: none;
          font-weight: bold;
        }
        .cta {
          background-color: #0066cc;
          color: #fff;
          padding: 0.4rem 0.8rem;
          border-radius: 5px;
          text-decoration: none;
          font-weight: bold;
          font-size: 0.9rem;
        }
        main {
          max-width: 600px;
          margin: 40px auto;
          padding: 2rem;
          background-color: #222;
          border-radius: 8px;
          text-align: center;
        }
        input[type="text"], input[type="email"] {
          width: 80%;
          padding: 10px;
          margin: 10px 0;
          border-radius: 4px;
          border: 1px solid #ccc;
          font-size: 16px;
        }
        button {
          background-color: #0066cc;
          color: #fff;
          padding: 10px 20px;
          border: none;
          border-radius: 4px;
          cursor: pointer;
          font-size: 16px;
        }
        button:hover {
          background-color: #004c99;
        }
        p.note {
          font-size: 14px;
          color: #ccc;
          margin-top: 20px;
        }

        @media screen and (max-width: 600px) {
          nav ul {
            flex-direction: column;
            gap: 0.5rem;
          }
          .cta {
            margin-top: 0.5rem;
          }

  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <div class="navbar">
      <div class="logo-container">
        <img src="https://wildeweswoolery.com/image/logo.png" alt="Company Logo" class="logo-img">
        <div class="logo-text">
          Wild Ewes Woolery
          <span>3rd Party Logistics</span>
        </div>
      </div>
      <nav>
        <ul>
          <li><a href="https://wildeweswoolery.com/index">Home</a></li>
          <li><a href="https://wildeweswoolery.com/about">About us</a></li>
          <li><a href="https://wildeweswoolery.com/index#whyus">Why us?</a></li>
          <li><a href="https://wildeweswoolery.com/shipper">Shippers</a></li>
          <li><a href="https://wildeweswoolery.com/carriers">Carriers</a></li>
          <li><a href="https://wildeweswoolery.com/index#services">Services</a></li>
          <li><a href="https://wildeweswoolery.com/contact">Contact us</a></li>
          <li><a href="https://wildeweswoolery.com/careers">Careers</a></li>
        </ul>
      </nav>
      <a class="cta" href="tel:866-448-3190">866-448-3190</a>
    </div>
  </header>

  <!-- Main Container -->
  <div class="container">
      <h1>Sign Up for SMS Notifications</h1>
      <form action="https://wildeweswoolery.com/text-notification/submit-sms-form/" method="POST">
          <label for="name">Full Name:</label>
          <input type="text" id="name" name="name" required>

          <label for="phone">Phone Number:</label>
          <input type="tel" id="phone" name="phone" placeholder="+1 555 555 5555" required>

          <label>
              <input type="checkbox" name="consent" required>
              I consent to receive SMS messages from Wilde Wes Woolery. Msg & data rates may apply. You will receive up to 3 messages per week. Reply STOP to unsubscribe at any time. Reply HELP for support. By subscribing, I agree to the <a href="https://wildeweswoolery.com/privacy" target="_blank">Privacy Policy</a>.
          </label>

          <button type="submit">Sign Up</button>
      </form>
      <div class="footer">
          <p>Privacy Policy: <a href="https://wildeweswoolery.com/privacy">View Here</a></p>
          <p>Opt-in Disclaimer: <a href="https://wildeweswoolery.com/text-notification">View Here</a></p>
      </div>
  </div>
</body>
