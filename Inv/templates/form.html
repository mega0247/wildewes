<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Invoice Generator</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; max-width: 800px; }
        label { display: block; margin-top: 10px; }
        input[type="text"], input[type="email"], input[type="number"], input[type="date"] {
            width: 100%; padding: 8px; box-sizing: border-box;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #f0f0f0; }
        button { margin-top: 20px; padding: 10px 20px; }
        .add-row { margin-top: 10px; cursor: pointer; color: blue; text-decoration: underline; display: inline-block; }
    </style>
</head>
<body>
    <h1>Generate Invoice</h1>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div style="color: {% if category=='success' %}green{% else %}red{% endif %}; font-weight: bold;">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="POST" action="/Inv/">
        <label>Client Name:</label>
        <input type="text" name="client_name" required />
        
        <label>Client Email:</label>
        <input type="email" name="client_email" required />
        
        <label>Client Address (optional):</label>
        <input type="text" name="client_address" />

        <label>Invoice Date:</label>
        <input type="date" name="invoice_date" required />

        <label>Invoice #:</label>
        <input type="text" name="invoice_number" value="34946" required />

        <label>Terms:</label>
        <input type="text" name="terms" value="Net 10" required />

        <h3>Invoice Items</h3>
        <table id="items-table">
            <thead>
                <tr>
                    <th>Description</th>
                    <th>Rate</th>
                    <th>Quantity</th>
                    <th>Amount</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><input type="text" name="description[]" required></td>
                    <td><input type="number" step="0.01" name="rate[]" required></td>
                    <td><input type="number" step="1" name="quantity[]" required></td>
                    <td><input type="number" step="0.01" name="amount[]" required></td>
                </tr>
            </tbody>
        </table>
        <span class="add-row" onclick="addRow()">+ Add Another Item</span>
        <br />
        <button type="submit">Generate and Send Invoice</button>
    </form>
    <script>
        function addRow() {
            const tbody = document.querySelector('#items-table tbody');
            const newRow = document.createElement('tr');
            newRow.innerHTML = `
                <td><input type="text" name="description[]" required></td>
                <td><input type="number" step="0.01" name="rate[]" required></td>
                <td><input type="number" step="1" name="quantity[]" required></td>
                <td><input type="number" step="0.01" name="amount[]" required></td>
            `;
            tbody.appendChild(newRow);
        }
    </script>
</body>
</html>
